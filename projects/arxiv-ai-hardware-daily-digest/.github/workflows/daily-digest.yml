name: Arxiv AI Hardware Daily Digest

on:
  # 每天上午8点（北京时间）自动执行
  schedule:
    - cron: '0 0 * * *'  # UTC时间0点，对应北京时间8点
  # 手动触发
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (no actual Feishu document creation)'
        required: false
        default: 'false'
        type: boolean

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        cd projects/arxiv-ai-hardware-daily-digest
        pip install -r requirements.txt
        
    - name: Create configuration file
      run: |
        cd projects/arxiv-ai-hardware-daily-digest
        cat > config/settings.yaml << 'EOF'
        # Arxiv AI Hardware Daily Digest - Production Configuration
        # Auto-generated by GitHub Actions
        
        arxiv:
          base_url: "http://export.arxiv.org/api/query"
          categories:
            - "cs.AR"
            - "cs.AI"
            - "cs.LG"
          keywords:
            hardware:
              - "quantization"
              - "sparsity"
              - "LLM hardware"
              - "AI accelerator"
              - "3D PIM"
            techniques:
              - "model compression"
              - "pruning"
          max_results: 50
          days_back: 1
        
        filter:
          quality_threshold: 0.7
          min_papers_per_day: 5
          max_papers_per_day: 15
          scoring_weights:
            keyword_match: 0.4
            author_reputation: 0.3
            recency: 0.2
            content_quality: 0.1
        
        feishu:
          app_id: ${{ secrets.FEISHU_APP_ID }}
          app_secret: ${{ secrets.FEISHU_APP_SECRET }}
          document_folder: "AI论文日报"
          document_title: "AI硬件加速论文日报 - {date}"
        
        schedule:
          cron: "0 8 * * *"
          timezone: "Asia/Shanghai"
        
        logging:
          level: "INFO"
          format: "json"
        
        debug:
          enabled: false
          dry_run: ${{ github.event.inputs.dry_run || 'false' }}
        EOF
        
    - name: Run daily digest
      env:
        FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
        FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        LOG_LEVEL: "INFO"
      run: |
        cd projects/arxiv-ai-hardware-daily-digest
        python -m src.main --config config/settings.yaml
        
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: digest-logs
        path: projects/arxiv-ai-hardware-daily-digest/logs/
        retention-days: 7
        
  test:
    runs-on: ubuntu-latest
    needs: generate-digest
    if: always()
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        cd projects/arxiv-ai-hardware-daily-digest
        pip install -r requirements.txt
        
    - name: Run tests
      run: |
        cd projects/arxiv-ai-hardware-daily-digest
        python -m pytest tests/ -v || echo "No tests found, skipping"
        
    - name: Check code quality
      run: |
        cd projects/arxiv-ai-hardware-daily-digest/src
        python -m py_compile *.py
        echo "✅ All Python files compile successfully"